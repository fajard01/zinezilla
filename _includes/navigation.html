<!-- top main navigation bar-->
<div class="main-nav">
    <nav>
        <img src={{ "/assets/img/logo.png" | relative_url }} class="logo logo-text">Zinezilla</img>
        <ul class="link-nav">
          {% for link in site.data.navigation.navlinks %}
          <li>
            <a class="link" href={{ link.link | relative_url }}>{{ link.title }}</a>
          </li>
          {% endfor %}
        </ul>
      </nav>
</div>
